<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alqurmani X | أدوات ذكية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Cairo',sans-serif;
}

body{
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#fff;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

.logo{
  font-weight:900;
  color:#22c55e;
}

/* BACK */
.back{
  position:fixed;
  top:15px;
  left:15px;
  width:40px;
  height:40px;
  background:#fff;
  color:#000;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-weight:bold;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:36px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:18px;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:scale(1.03);
  background:rgba(255,255,255,0.1);
}

/* PAGES */
.page{
  display:none;
  padding:20px;
  max-width:800px;
  margin:auto;
}

input{
  width:70%;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  cursor:pointer;
  font-weight:bold;
}

.item{
  background:#1e293b;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  opacity:.5;
}

</style>
</head>

<body>

<div class="back" onclick="goHome()">←</div>

<nav>
  <div class="logo">Alqurmani X</div>
  <div>Smart Tools</div>
</nav>

<!-- HOME -->
<div id="home">

<div class="hero">
  <h1>🚀 Alqurmani X Tools</h1>
  <p>منصة أدوات ذكية للنمو والـ SEO</p>
</div>

<div class="grid">

  <div class="card" onclick="openTool('keyword')">
    🔥 مولد كلمات مفتاحية
  </div>

  <div class="card" onclick="openTool('idea')">
    💡 مولد أفكار محتوى
  </div>

  <div class="card" onclick="openTool('title')">
    🧠 مولد عناوين جذابة
  </div>

</div>

</div>

<!-- KEYWORD -->
<div id="keyword" class="page">
<h2>🔥 مولد كلمات مفتاحية</h2><br>
<input id="kw" placeholder="اكتب كلمة">
<button onclick="genKeyword()">توليد</button>
<div id="out1"></div>
</div>

<!-- IDEA -->
<div id="idea" class="page">
<h2>💡 أفكار محتوى</h2><br>
<input id="ideaInput" placeholder="مجال المحتوى">
<button onclick="genIdea()">توليد</button>
<div id="out2"></div>
</div>

<!-- TITLE -->
<div id="title" class="page">
<h2>🧠 عناوين جذابة</h2><br>
<input id="titleInput" placeholder="الموضوع">
<button onclick="genTitle()">توليد</button>
<div id="out3"></div>
</div>

<footer>
© Alqurmani X Platform
</footer>

<script>

/* ===== NAV SYSTEM ===== */
function openTool(id){
  document.getElementById("home").style.display="none";
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

function goHome(){
  document.getElementById("home").style.display="block";
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
}

/* ===== KEYWORDS ===== */
function genKeyword(){
  let q=document.getElementById("kw").value;
  let out=document.getElementById("out1");
  out.innerHTML="";

  let arr=[
    "كيفية "+q,
    "أفضل "+q,
    q+" مجانا",
    q+" 2026",
    "شرح "+q,
    q+" بدون برامج",
    "طريقة "+q
  ];

  arr.forEach(i=>{
    out.innerHTML += `<div class="item">${i}</div>`;
  });
}

/* ===== IDEAS ===== */
function genIdea(){
  let q=document.getElementById("ideaInput").value;
  let out=document.getElementById("out2");
  out.innerHTML="";

  let arr=[
    "10 أفكار عن "+q,
    "أسرار "+q,
    "دليل شامل "+q,
    "أخطاء شائعة في "+q,
    "كيف تبدأ في "+q
  ];

  arr.forEach(i=>{
    out.innerHTML += `<div class="item">${i}</div>`;
  });
}

/* ===== TITLES ===== */
function genTitle(){
  let q=document.getElementById("titleInput").value;
  let out=document.getElementById("out3");
  out.innerHTML="";

  let arr=[
    "🔥 الطريقة السرية في "+q,
    "⚡ تعلم "+q+" في 5 دقائق",
    "🚀 دليل احترافي لـ "+q,
    "😱 لن تصدق كيف يعمل "+q,
    "💎 أسرار "+q
  ];

  arr.forEach(i=>{
    out.innerHTML += `<div class="item">${i}</div>`;
  });
}

</script>

</body>
</html>
