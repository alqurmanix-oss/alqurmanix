<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تواصل معنا - القرماني X</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background:#050816;
color:#fff;
overflow:hidden;
}

/* نجوم ذهبية */
.star{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
box-shadow:0 0 10px gold;
animation:float 6s infinite linear;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
20%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

header{
text-align:center;
padding:15px;
}

h1{
font-size:26px;
background:linear-gradient(90deg,#ffd700,#00ffd5,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.online{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#00ff88;
box-shadow:0 0 10px #00ff88;
animation:blink 1s infinite;
}

@keyframes blink{50%{opacity:0.3}}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.box{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#111827;
color:#fff;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(90deg,#ffd700,#00ffd5,#a855f7);
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:#0f172a;
padding:20px;
border-radius:15px;
border:1px solid #00ffd5;
transition:0.3s;
}

.popup.show{
transform:translate(-50%,-50%) scale(1);
}
</style>
</head>

<body>

<header>
<h1>📩 تواصل معنا - Alqurmani X</h1>

<div class="online">
<span class="dot"></span>
<span>متصل الآن</span>
</div>
</header>

<div class="container">
<div class="box">

<input id="name" placeholder="الاسم *">
<input id="email" placeholder="البريد الإلكتروني *">
<input id="subject" placeholder="الموضوع *">

<textarea id="message" placeholder="رسالتك"></textarea>

<button onclick="send()">إرسال</button>

</div>
</div>

<div class="popup" id="popup">🚀 تم الإرسال بنجاح</div>

<script>

/* نجوم */
for(let i=0;i<25;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(s);
}

/* صوت ترحيب مرة واحدة */
if(!sessionStorage.getItem("w")){
let m=new SpeechSynthesisUtterance("مرحباً بك في نظام القرماني إكس");
m.lang="ar";
speechSynthesis.speak(m);
sessionStorage.setItem("w","1");
}

/* إرسال */
async function send(){

const btn=document.querySelector("button");
btn.disabled=true;
btn.innerText="جاري الإرسال...";

try{

if(!name.value||!email.value||!subject.value){
alert("املأ البيانات الأساسية");
btn.disabled=false;
btn.innerText="إرسال";
return;
}

const geo=await fetch("https://ipapi.co/json/").then(r=>r.json());

const data={
name:name.value,
email:email.value,
subject:subject.value,
message:message.value,
ip:geo.ip,
location:geo.country_name+" - "+geo.city,
time:new Date().toLocaleString()
};

await fetch("https://eo33ut6m60kqbgp.m.pipedream.net",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

/* صوت نجاح */
let ok=new SpeechSynthesisUtterance("تم إرسال الرسالة بنجاح");
ok.lang="ar";
speechSynthesis.speak(ok);

/* popup */
popup.classList.add("show");
setTimeout(()=>popup.classList.remove("show"),2500);

/* تنظيف */
name.value="";
email.value="";
subject.value="";
message.value="";

}catch(e){
alert("خطأ في الإرسال");
}

btn.disabled=false;
btn.innerText="إرسال";
}

</script>

</body>
</html>
