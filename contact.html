<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصل معنا | Alqurmani X</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#050816;
    color:#fff;
    overflow-x:hidden;
}

/* خلفية بسيطة فخمة */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 30% 30%, rgba(0,255,200,0.08), transparent 40%),
               radial-gradient(circle at 70% 70%, rgba(255,215,0,0.06), transparent 40%);
    z-index:-1;
}

/* Header */
header{
    text-align:center;
    padding:25px;
}

header h1{
    font-size:26px;
    background:linear-gradient(90deg,#ffd700,#00ffd5,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* layout */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* form */
.box{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

input,textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    outline:none;
    background:#111827;
    color:#fff;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#ffd700,#00ffd5,#a855f7);
    cursor:pointer;
    font-weight:bold;
}

/* الدعم الفني (متحرك) */
.support{
    margin-top:20px;
    padding:15px;
    text-align:center;
    border-radius:14px;
    animation: colors 5s infinite linear;
    font-weight:bold;
}

@keyframes colors{
    0%{background:#00ffd5;}
    25%{background:#a855f7;}
    50%{background:#ffd700;}
    75%{background:#00ff88;}
    100%{background:#00ffd5;}
}

/* أزرار */
.btn{
    position:fixed;
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    font-size:18px;
}

.back{
    bottom:90px;
    left:20px;
    background:linear-gradient(45deg,#ffcc00,#ff6600);
}

.top{
    bottom:20px;
    left:20px;
    background:linear-gradient(45deg,#00ffd5,#a855f7,#ffd700);
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
<h1>⚡ Alqurmani X - Contact Hub</h1>
</header>

<div class="container">

<div class="box">

<h3>📩 تواصل معنا</h3>

<input id="name" placeholder="الاسم">
<input id="whatsapp" placeholder="رقم الواتس (اختياري)">
<input id="specialty" placeholder="الاختصاص">
<input id="subject" placeholder="الموضوع">
<textarea id="message" placeholder="اكتب رسالتك..."></textarea>

<button onclick="send()">إرسال</button>

<div class="support">
🟡 الدعم الفني متاح الآن - Alqurmani X System
</div>

</div>

</div>

<div class="btn back" onclick="goBack()">🔙</div>
<div class="btn top" onclick="scrollToTop()">⬆️</div>

<script>

/* ===== إرسال البيانات ===== */
function send(){

const data = {
name: document.getElementById("name").value,
whatsapp: document.getElementById("whatsapp").value,
specialty: document.getElementById("specialty").value,
subject: document.getElementById("subject").value,
message: document.getElementById("message").value,

/* بيانات مخفية */
source_url: window.location.href,
referrer: document.referrer,
time: new Date().toISOString(),
ip: "auto-pipedream",
location: "auto-pipedream"
};

/* إرسال لـ Pipedream */
fetch("https://eo33ut6m60kqbgp.m.pipedream.net",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

/* صوت بسيط عند الإرسال */
try{
let msg = new SpeechSynthesisUtterance("تم إرسال رسالتك بنجاح");
msg.lang="ar";
speechSynthesis.speak(msg);
}catch(e){}

alert("🚀 تم إرسال الرسالة إلى النظام");
}

/* رجوع */
function goBack(){
if(document.referrer){
window.location = document.referrer;
}else{
history.back();
}
}

/* أعلى */
function scrollToTop(){
window.scrollTo({top:0,behavior:'smooth'});
}

</script>

</body>
</html>
