<!DOCTYPE html>
<html lang="ar" dir="rtl">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصل معنا - القرماني X</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#ffd700;
  --cyan:#00ffd5;
  --violet:#a855f7;
  --green:#00ff88;
  --bg:#050816;
  --card:rgba(255,255,255,0.05);
  --input:#111827;
}

/* أساسيات */
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
  user-select:none;
}

/* خلفية نيون */
.bg{
  position:fixed; inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,200,0.08), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,215,0,0.06), transparent 40%);
  z-index:-2;
}

/* نجوم ذهبية */
.star{
  position:fixed;
  width:6px;height:6px;border-radius:50%;
  background:gold; box-shadow:0 0 10px gold;
  animation:float linear infinite;
  z-index:-1;
}
@keyframes float{
  0%{transform:translateY(110vh);opacity:0}
  20%{opacity:1}
  100%{transform:translateY(-10vh);opacity:0}
}

/* الهيدر */
header{ text-align:center; padding:18px 10px 8px }
.logo{
  font-size:28px; font-weight:900;
  background:linear-gradient(90deg,var(--gold),var(--cyan),var(--violet),var(--green));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.online{
  display:flex;justify-content:center;align-items:center;gap:8px;margin-top:6px
}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--green); box-shadow:0 0 12px var(--green);
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:.3}}
.intro{opacity:.9;margin-top:6px}

/* الحاوية */
.container{max-width:900px;margin:auto;padding:16px}
.box{
  background:var(--card);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:16px;
}

/* الحقول */
input,textarea{
  width:100%; padding:12px; margin:8px 0;
  border:none; outline:none; border-radius:10px;
  background:var(--input); color:#fff;
}
button{
  width:100%; padding:12px; margin-top:6px;
  border:none; border-radius:10px; cursor:pointer; font-weight:700;
  background:linear-gradient(90deg,var(--gold),var(--cyan),var(--violet));
}

/* أخطاء */
.error{color:#ff4d4d;text-align:center;margin-top:6px}

/* دعم فني */
.support{
  margin-top:10px; padding:10px; text-align:center; border-radius:12px;
  animation:colors 5s infinite linear; font-weight:700;
}
@keyframes colors{
  0%{background:#00ffd5}
  25%{background:#a855f7}
  50%{background:#ffd700}
  75%{background:#00ff88}
  100%{background:#00ffd5}
}

/* أزرار عائمة */
.btn{
  position:fixed; width:56px;height:56px;border-radius:50%;
  display:flex;justify-content:center;align-items:center;
  font-size:18px; cursor:pointer; z-index:10;
}
.back{bottom:90px; left:20px; background:linear-gradient(45deg,#ffcc00,#ff6600,#ff00ff)}
.top{bottom:20px; left:20px; background:linear-gradient(45deg,var(--cyan),var(--violet),var(--gold))}

/* روابط */
.links a{
  display:block;text-align:center;margin-top:10px;padding:10px;border-radius:10px;
  text-decoration:none;font-weight:700
}
.home{
  background:linear-gradient(90deg,var(--cyan),var(--gold),var(--violet));
  color:#000;
}
.support-link{
  background:#111827;border:1px solid var(--cyan);color:var(--cyan)
}

/* خريطة */
.map{
  margin-top:12px;border-radius:12px;overflow:hidden;border:1px solid var(--cyan)
}

/* Popup فخم */
.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.45);
  backdrop-filter:blur(4px); display:none; z-index:9998;
}
.popup{
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(.85);
  background:rgba(15,23,42,.95);
  padding:22px; border-radius:18px;
  border:1px solid var(--cyan);
  box-shadow:0 0 28px rgba(0,255,213,.35);
  text-align:center; opacity:0; transition:.25s;
  z-index:9999; max-width:90%;
}
.popup.show{opacity:1; transform:translate(-50%,-50%) scale(1)}
</style>
</head>

<body>

<div class="bg"></div>

<header>
  <div class="logo">⚜️ Alqurmani X Contact</div>
  <div class="online"><span class="dot"></span><span>متصل الآن</span></div>
  <div class="intro">نظام تواصل رسمي — استجابة سريعة وآمنة</div>
</header>

<div class="container">
  <div class="box">

    <!-- الحقول -->
    <input id="name" placeholder="الاسم *">
    <input id="email" placeholder="البريد الإلكتروني *">
    <input id="subject" placeholder="الموضوع *">
    <input id="whatsapp" placeholder="واتساب (اختياري)">
    <input id="specialty" placeholder="الاختصاص (اختياري)">
    <textarea id="message" placeholder="اكتب رسالتك..."></textarea>

    <button id="sendBtn" onclick="send()">إرسال</button>
    <div class="error" id="error"></div>

    <!-- دعم فني -->
    <div class="support">🟡 الدعم الفني متاح الآن</div>

    <!-- خريطة أسوان -->
    <div class="map">
      <iframe src="https://www.google.com/maps?q=Aswan,Egypt&output=embed"
              width="100%" height="220" style="border:0;"></iframe>
    </div>

    <!-- روابط -->
    <div class="links">
      <!-- عدّل الرابط التالي لصفحتك الرئيسية على GitHub -->
      <a class="home" href="https://YOUR-GITHUB-USERNAME.github.io/YOUR-REPO/index.html" target="_blank">🏠 الصفحة الرئيسية</a>
      <!-- ملف الدعم الفني -->
      <a class="support-link" href="support.html" target="_blank">🛠️ الدعم الفني</a>
    </div>

  </div>
</div>

<!-- أزرار -->
<div class="btn back" onclick="goBack()">🔙</div>
<div class="btn top" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆️</div>

<!-- Popup -->
<div class="overlay" id="overlay"></div>
<div class="popup" id="popup">🚀 تم إرسال الرسالة بنجاح</div>

<script>
/* نجوم */
for(let i=0;i<28;i++){
  const s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(4+Math.random()*5)+"s";
  document.body.appendChild(s);
}

/* ترحيب صوتي مرة واحدة */
if(!sessionStorage.getItem("welcome")){
  try{
    const m=new SpeechSynthesisUtterance("مرحباً بك في نظام القرماني إكس");
    m.lang="ar";
    speechSynthesis.speak(m);
  }catch(e){}
  sessionStorage.setItem("welcome","1");
}

/* حماية واجهة أساسية */
document.oncontextmenu=()=>false;
document.onkeydown=(e)=>{ if(e.ctrlKey||e.keyCode===123){ e.preventDefault(); return false; } };

/* رجوع */
function goBack(){
  if(document.referrer) location.href=document.referrer;
  else history.back();
}

/* Popup helpers */
function showPopup(){
  const p=document.getElementById('popup');
  const o=document.getElementById('overlay');
  o.style.display='block';
  p.classList.add('show');
  setTimeout(()=>{ p.classList.remove('show'); o.style.display='none'; },2600);
}

/* إرسال */
async function send(){
  const btn=document.getElementById('sendBtn');
  const err=document.getElementById('error');
  err.innerText="";

  const nameVal=document.getElementById('name').value.trim();
  const emailVal=document.getElementById('email').value.trim();
  const subjectVal=document.getElementById('subject').value.trim();

  if(!nameVal || !emailVal || !subjectVal){
    err.innerText="الاسم + البريد + الموضوع مطلوبين";
    return;
  }

  btn.disabled=true; btn.innerText="جاري الإرسال...";

  try{
    const ref=document.referrer;
    const geo=await fetch("https://ipapi.co/json/").then(r=>r.json()).catch(()=>({}));

    const data={
      name:nameVal,
      email:emailVal,
      subject:subjectVal,
      whatsapp:document.getElementById('whatsapp').value,
      specialty:document.getElementById('specialty').value,
      message:document.getElementById('message').value,
      source_url: ref || "Direct",
      ip: geo.ip || "Unknown",
      location: (geo.country_name||"") + " - " + (geo.city||""),
      time: new Date().toLocaleString('ar-EG')
    };

    /* ضع هنا رابط الـ Webhook الخاص بك */
    await fetch("https://eo33ut6m60kqbgp.m.pipedream.net",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    /* صوت نجاح */
    try{
      const ok=new SpeechSynthesisUtterance("تم إرسال الرسالة بنجاح");
      ok.lang="ar"; speechSynthesis.speak(ok);
    }catch(e){}

    showPopup();

    /* تنظيف */
    document.getElementById('name').value="";
    document.getElementById('email').value="";
    document.getElementById('subject').value="";
    document.getElementById('whatsapp').value="";
    document.getElementById('specialty').value="";
    document.getElementById('message').value="";

  }catch(e){
    err.innerText="حدث خطأ في الإرسال";
  }

  btn.disabled=false; btn.innerText="إرسال";
}
</script>

</body>
</html>
